# 10-token-pair LLMPrint run with paper-style optimization hyperparameters.
token_pairs_path: data/llmprint_token_pairs_paper.jsonl
num_token_pairs: 10
num_steps: 1000
suffix_len: 20
top_k: 64
search_width: 64
batch_size: 64
template: raw
verification_mode: black_box
black_box_samples: 100
threshold: 0.7
alpha: 0.5
beta: 1.0
seed: 42
do_sample: true
allow_non_ascii: false
filter_retokenization: true
log_every: 10
