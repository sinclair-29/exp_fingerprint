# Paper-scale SRAF Base(64) setting representable in this single-model framework.
# The paper's best SRAF variant jointly optimizes homologous models and templates;
# this framework supports the one-source-model Base(64) analogue.
num_fingerprints: 50
num_steps: 1000
mutable_len: 64
top_k: 256
search_width: 512
batch_size: 512
templates: [llama2_chat]
compute_ppl: false
seed: 0
max_new_tokens: 48
allow_non_ascii: false
filter_retokenization: true
log_every: 10
targets:
