# 10-question ProFLingo run with paper-style optimization hyperparameters.
questions_path: data/proflingo_questions_paper.jsonl
num_questions: 10
num_steps: 256
prefix_len: 32
top_k: 128
search_width: 512
batch_size: 512
templates: [fastchat_zero_shot, alpaca]
num_attempts: 1
seed: 42
max_new_tokens: 256
allow_non_ascii: false
filter_retokenization: true
log_every: 10
